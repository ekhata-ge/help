<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Khata Help - Godrej Eternity</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f4f7f6;
    padding: 10px;
}

.widget {
    max-width: 1000px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #ccc;
}

.header {
    background: #0d3b6e;
    color: #fff;
    padding: 20px;
    text-align: center;
}

.content { padding: 15px; }

.desc {
    font-size: 13px;
    color: #0d3b6e;
    margin-bottom: 12px;
    padding: 10px;
    background: #eef4fb;
    border-left: 4px solid #0d3b6e;
}

/* Layout */
.layout { display: flex; gap: 20px; }

/* Sidebar (desktop) */
.sidebar { width: 240px; }

.tab {
    padding: 10px;
    cursor: pointer;
    border-radius: 6px;
    margin-bottom: 5px;
    font-size: 14px;
}

.tab.main {
    font-weight: bold;
    border: 1px solid #0d3b6e;
}

.tab.sub { padding-left: 20px; }

.tab.active {
    background: #0d3b6e;
    color: white;
}

/* Mobile Tabs */
.mobile-tabs {
    display: none;
    overflow-x: auto;
    gap: 8px;
    padding-bottom: 10px;
    margin-bottom: 10px;
}

.mobile-tab {
    flex: 0 0 auto;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid #0d3b6e;
    font-size: 13px;
    white-space: nowrap;
    cursor: pointer;
}

.mobile-tab.active {
    background: #0d3b6e;
    color: #fff;
}

/* Main */
.main { flex: 1; }

/* Search */
.search-wrapper {
    position: relative;
    margin-bottom: 15px;
}

.search-box {
    width: 100%;
    padding: 12px 14px 12px 40px;
    border-radius: 25px;
    border: 1px solid #ccc;
}

.search-icon {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
}

/* Highlight */
mark {
    background: #fff3a0;
    padding: 2px 4px;
    border-radius: 3px;
}

/* FAQ */
.faq-item {
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-bottom: 12px;
}

.faq-q {
    padding: 14px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-weight: 600;
}

/* Arrow FIXED */
.faq-arrow {
    min-width: 20px;
    color: #0d3b6e;
    margin-top: 2px;
    transition: 0.2s;
}

.faq-item.open .faq-arrow {
    transform: rotate(90deg);
}

.badge {
    background: #0d3b6e;
    color: #fff;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
    min-width: 28px;
    text-align: center;
}

.faq-text {
    flex: 1;
}

.faq-a { max-height: 0; overflow: hidden; }

.faq-item.open .faq-a {
    max-height: 1000px;
    padding: 14px;
}

.faq-answer-content {
    background: #fafafa;
    padding: 12px;
    border-radius: 6px;
    font-size: 14px;
}

ul {
    padding-left: 18px;
    margin: 6px 0;
}

/* MOBILE */
@media (max-width: 768px) {
    .layout { flex-direction: column; }
    .sidebar { display: none; }
    .mobile-tabs { display: flex; }
}
</style>
</head>

<body>

<div class="widget">
    <div class="header">
        <h2>E-Khata Help Center</h2>
        <p>Resource for Godrej Eternity Owners</p>
    </div>

    <div class="content">
        <div class="desc">📋 Prepared by Godrej Eternity e-Khata Volunteers Team</div>
        <div id="faq-container">Loading...</div>
        <div style="text-align:center; font-size:12px; margin-top:10px;">
            Last updated: April 2026
        </div>
    </div>
</div>

<script>
const SHEET_ID = "1SpPWDuj1WfuSA2tv9AVPGsNGMTycMk4PKaliltBnp04";
const EXPORT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

let allFAQs = [];
let currentCategory = "All Questions";
let currentSearch = "";

async function loadFAQs(){
    const res = await fetch(EXPORT_URL);
    const text = await res.text();
    parseCSV(text);
}

function parseCSV(text){
    const rows=[]; let row=[],field='',inQuotes=false;

    for(let i=0;i<text.length;i++){
        let c=text[i],n=text[i+1];
        if(c=='"' && inQuotes && n=='"'){field+='"';i++;}
        else if(c=='"'){inQuotes=!inQuotes;}
        else if(c==',' && !inQuotes){row.push(field);field='';}
        else if(c=='\n' && !inQuotes){row.push(field);rows.push(row);row=[];field='';}
        else field+=c;
    }

    if(field)row.push(field);
    if(row.length)rows.push(row);

    allFAQs = rows.slice(1).map(r=>({
        category:r[0]?.trim(),
        question:r[1]?.trim(),
        answer:r[2]?.trim()
    })).filter(f=>f.category && f.question && f.answer);

    render();
}

function render(){
    const container=document.getElementById('faq-container');
    const categories=[...new Set(allFAQs.map(f=>f.category))];

    container.innerHTML=`
    <div class="layout">

        <div class="sidebar">
            <div class="tab main ${currentCategory==="All Questions"?"active":""}" onclick="changeCategory('All Questions')">All Questions</div>
            ${categories.map(c=>`<div class="tab sub ${currentCategory===c?"active":""}" onclick="changeCategory('${c}')">${c}</div>`).join('')}
        </div>

        <div class="main">

            <div class="mobile-tabs">
                <div class="mobile-tab ${currentCategory==="All Questions"?"active":""}" onclick="changeCategory('All Questions')">All</div>
                ${categories.map(c=>`<div class="mobile-tab ${currentCategory===c?"active":""}" onclick="changeCategory('${c}')">${c}</div>`).join('')}
            </div>

            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input class="search-box" placeholder="Search FAQs..." oninput="handleSearch(this.value)">
            </div>

            <div id="faq-list"></div>
        </div>

    </div>`;

    renderFAQList();
}

function highlight(text){
    if(!currentSearch) return text;
    const r=new RegExp(`(${currentSearch})`,'gi');
    return text.replace(r,'<mark>$1</mark>');
}

function formatAnswer(text){
    text = linkify(text);
    let blocks = text.split("||");

    return blocks.map(block=>{
        block=block.trim();

        if(block.includes("|")){
            let items=block.split("|").map(i=>i.trim()).filter(i=>i);
            return `<ul>${items.map(i=>`<li>${highlight(i)}</li>`).join('')}</ul>`;
        } else {
            return `<p>${highlight(block)}</p>`;
        }
    }).join("");
}

function renderFAQList(){
    let data = currentCategory==="All Questions"
        ? allFAQs
        : allFAQs.filter(f=>f.category===currentCategory);

    if(currentSearch){
        let s=currentSearch.toLowerCase();
        data=data.filter(f=>f.question.toLowerCase().includes(s)||f.answer.toLowerCase().includes(s));
    }

    let html='',i=1;

    data.forEach(f=>{
        html+=`
        <div class="faq-item">
            <div class="faq-q" onclick="this.parentElement.classList.toggle('open')">
                <span class="faq-arrow">▶</span>
                <span class="badge">${i}</span>
                <span class="faq-text">${highlight(f.question)}</span>
            </div>
            <div class="faq-a">
                <div class="faq-answer-content">${formatAnswer(f.answer)}</div>
            </div>
        </div>`;
        i++;
    });

    document.getElementById('faq-list').innerHTML = html || "<p>No results found</p>";
}

function changeCategory(c){
    currentCategory=c;
    render();
}

function handleSearch(val){
    currentSearch=val;
    renderFAQList();
}

function linkify(text){
    return text.replace(/https?:\/\/[^\s]+/g,u=>`<a href="${u}" target="_blank">${u}</a>`);
}

window.onload=loadFAQs;
</script>

</body>
</html>
