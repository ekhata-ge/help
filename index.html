<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Khata Help - Godrej Eternity</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f4f7f6;
    padding: 20px;
}

.widget {
    max-width: 1000px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #ccc;
}

.header {
    background: #0d3b6e;
    color: #fff;
    padding: 25px;
    text-align: center;
}

.content { padding: 20px; }

.desc {
    font-size: 13px;
    font-style: italic;
    color: #0d3b6e;
    margin-bottom: 15px;
    padding: 10px;
    background: #eef4fb;
    border-left: 4px solid #0d3b6e;
}

/* Layout */
.layout { display: flex; gap: 20px; }

/* Sidebar */
.sidebar { width: 240px; }

.tab {
    padding: 10px;
    cursor: pointer;
    border-radius: 6px;
    margin-bottom: 5px;
    font-size: 14px;
    text-align: left;
}

.tab.main {
    font-weight: bold;
    border: 1px solid #0d3b6e;
}

.tab.sub {
    padding-left: 20px;
    font-size: 13px;
}

.tab.active {
    background: #0d3b6e;
    color: white;
}

/* Main */
.main { flex: 1; }

/* Search */
.search-wrapper {
    position: relative;
    margin-bottom: 15px;
}

.search-box {
    width: 100%;
    padding: 12px 14px 12px 40px;
    border-radius: 25px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.search-icon {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
}

/* Highlight */
mark {
    background: #fff3a0;
    padding: 2px 4px;
    border-radius: 3px;
}

/* FAQ */
.faq-item {
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-bottom: 12px;
}

.faq-q {
    padding: 14px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-weight: 600;
    text-align: left;
}

.faq-q::before {
    content: "▶";
    color: #0d3b6e;
    min-width: 18px;
    margin-top: 2px;
}

.faq-item.open .faq-q::before {
    transform: rotate(90deg);
}

.faq-a {
    max-height: 0;
    overflow: hidden;
}

.faq-item.open .faq-a {
    max-height: 1000px;
    padding: 14px;
}

.faq-answer-content {
    background: #fafafa;
    padding: 12px;
    border-radius: 6px;
    font-size: 14px;
    text-align: left;
}

.badge {
    background: #0d3b6e;
    color: #fff;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
    min-width: 28px;
    text-align: center;
}

.footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    color: #666;
}

.loading { text-align: center; padding: 30px; }
</style>
</head>

<body>

<div class="widget">
    <div class="header">
        <h2>E-Khata Help Center</h2>
        <p>Resource for Godrej Eternity Owners</p>
    </div>

    <div class="content">
        <div class="desc">📋 Prepared by Godrej Eternity e-Khata Volunteers Team</div>
        <div id="faq-container" class="loading">Loading...</div>
        <div class="footer">Last updated: April 2026</div>
    </div>
</div>

<script>
const SHEET_ID = "1SpPWDuj1WfuSA2tv9AVPGsNGMTycMk4PKaliltBnp04";
const EXPORT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

let allFAQs = [];
let currentCategory = "All Questions";
let currentSearch = "";

/* LOAD */
async function loadFAQs(){
    const res = await fetch(EXPORT_URL);
    const text = await res.text();
    parseCSV(text);
}

/* CSV parser */
function parseCSV(text){
    const rows=[];
    let row=[],field='',inQuotes=false;

    for(let i=0;i<text.length;i++){
        let c=text[i],n=text[i+1];

        if(c=='"' && inQuotes && n=='"'){field+='"';i++;}
        else if(c=='"'){inQuotes=!inQuotes;}
        else if(c==',' && !inQuotes){row.push(field);field='';}
        else if(c=='\n' && !inQuotes){row.push(field);rows.push(row);row=[];field='';}
        else field+=c;
    }

    if(field)row.push(field);
    if(row.length)rows.push(row);

    allFAQs = rows.slice(1).map(r=>({
        category:r[0]?.trim(),
        question:r[1]?.trim(),
        answer:r[2]?.trim()
    })).filter(f=>f.category && f.question && f.answer);

    renderLayout();
}

/* LAYOUT */
function renderLayout(){
    const container=document.getElementById('faq-container');
    const categories=[...new Set(allFAQs.map(f=>f.category))];

    container.innerHTML = `
    <div class="layout">
        <div class="sidebar">
            <div class="tab main active" onclick="changeCategory('All Questions', event)">All Questions</div>
            ${categories.map(c=>`
                <div class="tab sub" onclick="changeCategory('${c}', event)">${c}</div>
            `).join('')}
        </div>

        <div class="main">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input id="searchBox" class="search-box" placeholder="Search FAQs...">
            </div>

            <div id="faq-list"></div>
        </div>
    </div>
    `;

    document.getElementById("searchBox").addEventListener("input", (e)=>{
        currentSearch = e.target.value;
        renderFAQList();
    });

    renderFAQList();
}

/* Highlight function */
function highlight(text){
    if(!currentSearch) return text;

    const escaped = currentSearch.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(${escaped})`, 'gi');

    return text.replace(regex, '<mark>$1</mark>');
}

/* FAQ LIST */
function renderFAQList(){
    const list = document.getElementById('faq-list');

    let data = currentCategory==="All Questions"
        ? allFAQs
        : allFAQs.filter(f=>f.category===currentCategory);

    if(currentSearch){
        let s=currentSearch.toLowerCase();
        data=data.filter(f =>
            f.question.toLowerCase().includes(s) ||
            f.answer.toLowerCase().includes(s)
        );
    }

    let html='';
    let i=1;

    data.forEach(f=>{
        html+=`
        <div class="faq-item" id="faq-${i}">
            <div class="faq-q" onclick="toggleFAQ('faq-${i}')">
                <span class="badge">${i}</span>
                <span>${highlight(f.question)}</span>
            </div>
            <div class="faq-a">
                <div class="faq-answer-content">${highlight(linkify(f.answer))}</div>
            </div>
        </div>`;
        i++;
    });

    if(data.length===0){
        html = `<p>No results found</p>`;
    }

    list.innerHTML = html;
}

/* CATEGORY */
function changeCategory(c, e){
    currentCategory=c;

    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    e.target.classList.add('active');

    renderFAQList();
}

/* TOGGLE */
function toggleFAQ(id){
    document.getElementById(id).classList.toggle("open");
}

/* LINKS */
function linkify(text){
    return text.replace(/https?:\/\/[^\s]+/g,u=>`<a href="${u}" target="_blank">${u}</a>`);
}

window.onload=loadFAQs;
</script>

</body>
</html>
