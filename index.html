<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Khata Help - Godrej Eternity</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f7f6; padding: 20px; }

.widget { max-width: 850px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

.header { background: #0d3b6e; color: #fff; padding: 30px; text-align: center; }

.content { padding: 25px; }

.desc {
    font-size: 13px;
    font-style: italic;
    color: #0d3b6e;
    margin-bottom: 15px;
    padding: 12px;
    background: #eef4fb;
    border-left: 4px solid #0d3b6e;
}

/* Sticky Tabs */
.tabs-container {
    position: sticky;
    top: 0;
    background: white;
    z-index: 10;
    padding-bottom: 10px;
}

.tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }

.tab {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid #0d3b6e;
    cursor: pointer;
    font-size: 13px;
    color: #0d3b6e;
    background: #fff;
}

.tab.active { background: #0d3b6e; color: #fff; }

/* Search */
.search-box {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    margin-bottom: 10px;
}

/* Controls */
.controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.btn {
    padding: 6px 12px;
    border: 1px solid #0d3b6e;
    border-radius: 6px;
    background: white;
    cursor: pointer;
    font-size: 12px;
}

/* FAQ */
.faq-item { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; }
.faq-q { padding: 16px; cursor: pointer; display: flex; gap: 10px; font-weight: 600; }
.faq-q::before { content: "▶"; color: #0d3b6e; transition: 0.2s; }
.faq-item.open .faq-q::before { transform: rotate(90deg); }

.faq-a { max-height: 0; overflow: hidden; transition: 0.3s; }
.faq-item.open .faq-a { max-height: 1000px; padding: 16px; }

.faq-answer-content {
    background: #fafafa;
    padding: 14px;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.6;
}

.badge {
    background: #0d3b6e;
    color: #fff;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    min-width: 30px;
    text-align: center;
}

.footer { text-align: center; padding: 20px; font-size: 13px; color: #666; }

.loading { text-align: center; padding: 40px; }
</style>
</head>

<body>

<div class="widget">
    <div class="header">
        <h2>E-Khata Help Center</h2>
        <p>Resource for Godrej Eternity Residents</p>
    </div>

    <div class="content">
        <div class="desc">📋 Prepared by Godrej Eternity e-Khata Volunteers Team</div>
        <div id="faq-container" class="loading">Loading FAQs...</div>
        <div class="footer">Last updated: April 2026</div>
    </div>
</div>

<script>
const SHEET_ID = "1SpPWDuj1WfuSA2tv9AVPGsNGMTycMk4PKaliltBnp04";
const EXPORT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

let allFAQs = [];
let currentCategory = "All Questions";
let currentSearch = "";

/* LOAD */
async function loadFAQs() {
    const res = await fetch(EXPORT_URL);
    const text = await res.text();
    parseCSV(text);
}

/* CSV PARSER */
function parseCSV(text) {
    const rows = [];
    let row = [], field = '', inQuotes = false;

    for (let i=0;i<text.length;i++){
        let c=text[i], n=text[i+1];

        if(c=='"' && inQuotes && n=='"'){ field+='"'; i++; }
        else if(c=='"'){ inQuotes=!inQuotes; }
        else if(c==',' && !inQuotes){ row.push(field); field=''; }
        else if(c=='\n' && !inQuotes){ row.push(field); rows.push(row); row=[]; field=''; }
        else field+=c;
    }

    if(field) row.push(field);
    if(row.length) rows.push(row);

    allFAQs = rows.slice(1).map(r=>({
        category:r[0]?.trim(),
        question:r[1]?.trim(),
        answer:r[2]?.trim()
    })).filter(f=>f.category && f.question && f.answer);

    renderFAQs();
}

/* RENDER */
function renderFAQs() {
    const container = document.getElementById('faq-container');
    const categories = [...new Set(allFAQs.map(f=>f.category))];

    let html = `
    <div class="tabs-container">
        <input class="search-box" placeholder="Search questions..." oninput="handleSearch(this.value)">
        
        <div class="tabs">
            <div class="tab ${currentCategory==="All Questions"?"active":""}" onclick="changeCategory('All Questions')">All Questions</div>
            ${categories.map(c=>`
                <div class="tab ${currentCategory===c?"active":""}" onclick="changeCategory('${c}')">${c}</div>
            `).join('')}
        </div>

        <div class="controls">
            <div class="btn" onclick="expandAll()">Expand All</div>
            <div class="btn" onclick="collapseAll()">Collapse All</div>
        </div>
    </div>
    `;

    let data = currentCategory==="All Questions"
        ? allFAQs
        : allFAQs.filter(f=>f.category===currentCategory);

    if(currentSearch){
        const s = currentSearch.toLowerCase();
        data = data.filter(f =>
            f.question.toLowerCase().includes(s) ||
            f.answer.toLowerCase().includes(s)
        );
    }

    let i=1;

    data.forEach(f=>{
        html += `
        <div class="faq-item" id="faq-${i}">
            <div class="faq-q" onclick="toggleFAQ('faq-${i}')">
                <span class="badge">${i}</span>
                <span>${f.question}</span>
            </div>
            <div class="faq-a">
                <div class="faq-answer-content">${linkify(f.answer)}</div>
            </div>
        </div>`;
        i++;
    });

    container.innerHTML = html;
}

/* EVENTS */
function changeCategory(cat){
    currentCategory = cat;
    renderFAQs();
}

function handleSearch(val){
    currentSearch = val;
    renderFAQs();
}

function toggleFAQ(id){
    document.getElementById(id).classList.toggle("open");
}

function expandAll(){
    document.querySelectorAll('.faq-item').forEach(e=>e.classList.add('open'));
}

function collapseAll(){
    document.querySelectorAll('.faq-item').forEach(e=>e.classList.remove('open'));
}

function linkify(text){
    return text.replace(/https?:\/\/[^\s]+/g,u=>`<a href="${u}" target="_blank">${u}</a>`);
}

window.onload = loadFAQs;
</script>

</body>
</html>
