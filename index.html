<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Khata Help - Godrej Eternity</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f7f6; padding: 20px; }
        .widget { max-width: 850px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { background: #0d3b6e; color: #fff; padding: 25px; text-align: center; }
        .tabs { display: flex; background: #eee; border-bottom: 1px solid #ccc; }
        .tab { flex: 1; padding: 15px; cursor: pointer; border: none; font-weight: bold; color: #555; font-size: 14px; }
        .tab.active { background: #fff; color: #0d3b6e; border-bottom: 3px solid #0d3b6e; }
        .content { padding: 25px; min-height: 500px; }
        .panel { display: none; }
        .panel.active { display: block; }
        .desc { font-size: 13px; font-style: italic; color: #0d3b6e; margin-bottom: 20px; padding: 10px; background: #eef4fb; border-radius: 6px; border-left: 4px solid #0d3b6e; }
        .cat-title { font-size: 18px; color: #0d3b6e; margin: 25px 0 12px; font-weight: bold; border-bottom: 2px solid #0d3b6e; padding-bottom: 5px; text-transform: uppercase; }
        .faq-item { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; }
        .faq-q { padding: 16px; cursor: pointer; font-weight: 600; background: #fff; display: flex; align-items: flex-start; gap: 12px; font-size: 15px; }
        .faq-a { padding: 20px; display: none; background: #fafafa; border-top: 1px solid #ddd; line-height: 1.7; font-size: 14px; color: #333; }
        .faq-item.open .faq-a { display: block; }
        .faq-item.open .faq-q { background: #f0f5ff; border-radius: 8px 8px 0 0; }
        .badge { background: #0d3b6e; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; min-width: 25px; text-align: center; }
        .msg-box { height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 12px; background: #fff; }
        .msg { padding: 12px 16px; border-radius: 12px; font-size: 14px; max-width: 85%; line-height: 1.5; }
        .msg.user { align-self: flex-end; background: #0d3b6e; color: #fff; border-bottom-right-radius: 2px; }
        .msg.bot { align-self: flex-start; background: #f0f2f5; border: 1px solid #ddd; border-bottom-left-radius: 2px; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        button.send { padding: 12px 25px; background: #0d3b6e; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        a { color: #1a5cb5; text-decoration: underline; font-weight: 500; }
    </style>
</head>
<body>

<div class="widget">
    <div class="header">
        <h2>E-Khata Help Assistant</h2>
        <p>Official Resource for Godrej Eternity Residents</p>
    </div>
    <div class="tabs">
        <button class="tab active" id="btn-faq" onclick="showTab('faq')">BROWSE ALL FAQs</button>
        <button class="tab" id="btn-chat" onclick="showTab('chat')">ASK AI ASSISTANT</button>
    </div>
    <div class="content">
        <div id="panel-faq" class="panel active">
            <div class="desc">Prepared by Godrej Eternity e-Khata Volunteers Team</div>
            <div id="faq-container"></div>
        </div>
        <div id="panel-chat" class="panel">
            <div class="msg-box" id="msg-box">
                <div class="msg bot">Namaste! I am your AI assistant. Ask me anything about the E-Khata process.</div>
            </div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Type your question here..." onkeydown="if(event.key==='Enter')sendToAI()">
                <button class="send" onclick="sendToAI()">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBa7WQyzEqzigkCpKtHXwfDRX8cx6sna7E";
    const MODEL = "gemini-2.5-flash-lite";

    const DATA = [
        { c: "Technical Issues", q: "I am getting a name mismatch issue. Where do I show the 'Sale Transferred' dropdown? In e-KYC or in KAVERI deed owners?", a: "Both sections select Sale/Transferred. If you cannot progress due to a technical issue, ensure the names match your registered sale deed exactly. If the error persists, it is likely a system sync issue with the GBA servers." },
        { c: "Technical Issues", q: "Two ePID numbers were created for the same Assessment number. How can this be sorted out?", a: "The GBA Helpdesk advised proceeding with the ePID that contains all your details (even if the address is missing). Ignore the newly generated ePID that has only the address." },
        { c: "Technical Issues", q: "Why is my property tax showing Rajarajeshwari Nagar/West zone when we are in South?", a: "This is a transition discrepancy between BBMP and GBA. Officially we are in South, but some records still show West. You do not need to worry about this label; it does not affect your legal status." },
        { c: "Application Process", q: "What are the essential differences in filling the application for mutation of e-Khata between Phase 1 and Phase 2/3?", a: "<b>Phase 1:</b> Select 'No book'. The 18-digit Gram Panchayat ID is the Assessment ID.<br><b>Phase 2/3:</b> Select 'Book A125'. The Assessment ID is alphanumeric. Check if ARO has signed; if not, you must attach the manual Challan. Rest of the procedure for draft khata to final e-Khata remains the same." },
        { c: "Application Process", q: "What should I enter in the 'Owners Share' column?", a: "Enter the percentage of ownership (e.g., 50% for joint owners). If you already have your e-Khata, update it here: <a href='https://bbmpeaasthi.karnataka.gov.in/citizen_core/UpdateOwnerShare' target='_blank'>Update Portal</a>." },
        { c: "Application Process", q: "My Khata was approved in 'Godrej' name instead of mine. Should I apply for mutation separately?", a: "No. Ask for corrections in final khata using the 'Corrections' link once logged in. Raising a helpdesk ticket or visiting the ARO office can resolve this. It typically takes 7 to 10 days for approval after the correction is submitted." },
        { c: "General Information", q: "What are the different ways in which I can apply for e-Khata?", a: "There are four online modes:<br>1. <b>Self-Apply:</b> Use official videos and apply yourself.<br>2. <b>Local Entrepreneur:</b> Find authorized youth entrepreneurs on <a href='https://bbmpeaasthi.karnataka.gov.in/' target='_blank'>the portal</a>.<br>3. <b>Janasevaka:</b> Available in useful links on the official website.<br>4. <b>Bangalore One:</b> Visit any center for online application assistance." },
        { c: "General Information", q: "What is the address for the BBMP Ward and ARO offices?", a: "<b>Ward Office:</b> 15/3, Kanakapura Main Rd, Talaghattapura, 560109.<br><b>ARO Office:</b> Srinivasa Arcade, No. 569/570, 80 feet Road, Kengeri Upanagara, 560060." },
        { c: "Status & Search", q: "For Phase 1 of the project, what are the steps to find my draft e-Khata?", a: "1. Visit the portal and login.<br>2. Select 'eKhata' > 'Draft to Final eKhata'.<br>3. Select Ward 198.<br>4. Search by 'Owner Name' and enter 'ಗೋದ್ರೇಜ್' (Godrej).<br>5. Look for your 18-digit Gram Panchayat ID from your Sale Deed." },
        { c: "Status & Search", q: "How to find the draft e-Khata for Phase 2 and Phase 3?", a: "In Ward 198, search by 'Book No' and enter 'A125'. Search for your Assessment or flat number. If not immediately visible, use page number hyperlinks to find the specific listing." },
        { c: "Status & Search", q: "How do I find the status of a submitted e-Khata and where do I download it?", a: "Status check: <a href='https://bbmpeaasthi.karnataka.gov.in/citizen_core/EkhataApplicationStatus' target='_blank'>Link</a><br>Download approved e-Khata: <a href='https://bbmpeaasthi.karnataka.gov.in/office/frmKhathaDownload.aspx' target='_blank'>Link</a>" },
        { c: "Documents", q: "What are the document references I need for the building license and approved plans?", a: "<b>Doc 1:</b> BMICAPA/SS/RD/13/20152016 (13-10-2015).<br><b>Doc 2:</b> BMICPA SITE PLAN (21-04-2016). Reference ID: 1501272677303." },
        { c: "Documents", q: "Where can I find official digital copies of CC, Building License, and Site Plan?", a: "CC/License: <a href='https://drive.google.com/file/d/1yRJ2aRRN-1Jh5xIOOVW7xrNhaMFNMMev/view' target='_blank'>PDF Link</a> | Plan: <a href='https://drive.google.com/file/d/1c1iDRBJmwSRBMq4rEWZ-k6aPIxeBJ2a0/view' target='_blank'>PDF Link</a>" }
    ];

    function showTab(t) {
        document.getElementById('panel-faq').classList.toggle('active', t === 'faq');
        document.getElementById('panel-chat').classList.toggle('active', t === 'chat');
        document.getElementById('btn-faq').classList.toggle('active', t === 'faq');
        document.getElementById('btn-chat').classList.toggle('active', t === 'chat');
    }

    function renderFAQs() {
        const container = document.getElementById('faq-container');
        const cats = ["Technical Issues", "Application Process", "General Information", "Status & Search", "Documents"];
        let html = '';
        let globalCounter = 1;

        cats.forEach(cat => {
            html += `<div class="cat-title">${cat}</div>`;
            DATA.filter(item => item.c === cat).forEach((item) => {
                const uniqueID = "faq-item-" + globalCounter;
                html += `
                <div class="faq-item" id="${uniqueID}">
                    <div class="faq-q" onclick="document.getElementById('${uniqueID}').classList.toggle('open')">
                        <span class="badge">${globalCounter}</span>
                        <span>${item.q}</span>
                    </div>
                    <div class="faq-a">${item.a}</div>
                </div>`;
                globalCounter++;
            });
        });
        container.innerHTML = html;
    }

    async function sendToAI() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('msg-box');
        const q = input.value.trim();
        if(!q) return;
        input.value = '';
        box.innerHTML += `<div class="msg user">${q}</div>`;
        const botDiv = document.createElement('div');
        botDiv.className = 'msg bot';
        botDiv.textContent = 'Searching records...';
        box.appendChild(botDiv);
        box.scrollTop = box.scrollHeight;

        try {
            const contextText = DATA.map((d, i) => (i+1) + ". " + d.q + " " + d.a).join(" ");
            const prompt = "Use this info: " + contextText + ". Answer politely for seniors: " + q;
            const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/" + MODEL + ":generateContent?key=" + API_KEY, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const json = await res.json();
            botDiv.innerHTML = json.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
        } catch(e) { botDiv.textContent = "Error connecting. Please refresh the page."; }
        box.scrollTop = box.scrollHeight;
    }

    window.onload = renderFAQs;
</script>
</body>
</html>
