<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Khata Help - Godrej Eternity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f7f6; padding: 20px; }
        .widget { max-width: 850px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { background: #0d3b6e; color: #fff; padding: 30px; text-align: center; }
        .header h2 { font-size: 28px; margin-bottom: 8px; }
        .header p { font-size: 16px; opacity: 0.95; }
        
        .content { padding: 25px; min-height: 500px; }
        .desc { font-size: 13px; font-style: italic; color: #0d3b6e; margin-bottom: 25px; padding: 12px; background: #eef4fb; border-radius: 6px; border-left: 4px solid #0d3b6e; }
        
        .cat-title { font-size: 18px; color: #0d3b6e; margin: 25px 0 15px 0; font-weight: bold; border-bottom: 2px solid #0d3b6e; padding-bottom: 8px; text-transform: uppercase; }
        .cat-title:first-of-type { margin-top: 0; }
        
        .faq-item { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; }
        .faq-q { padding: 16px; cursor: pointer; font-weight: 600; background: #fff; display: flex; align-items: flex-start; gap: 12px; font-size: 15px; user-select: none; transition: all 0.2s ease; }
        .faq-q:hover { background: #f9fbff; }
        .faq-q::before { content: "▶"; display: inline-block; width: 20px; color: #0d3b6e; transition: transform 0.2s ease; flex-shrink: 0; }
        .faq-item.open .faq-q::before { transform: rotate(90deg); }
        .faq-a { padding: 0 16px; max-height: 0; overflow: hidden; transition: all 0.3s ease; }
        .faq-item.open .faq-a { padding: 16px; max-height: 1000px; }
        .faq-answer-content { background: #fafafa; padding: 16px; border-radius: 6px; line-height: 1.7; font-size: 14px; color: #333; }
        .faq-item.open .faq-q { background: #f0f5ff; border-radius: 8px 8px 0 0; }
        
        .badge { background: #0d3b6e; color: white; padding: 4px 10px; border-radius: 4px; font-size: 12px; min-width: 30px; text-align: center; flex-shrink: 0; }
        
        a { color: #1a5cb5; text-decoration: underline; font-weight: 500; }
        a:hover { color: #0d3b6e; }
        
        .footer { text-align: center; padding: 20px; border-top: 1px solid #eee; margin-top: 20px; color: #666; font-size: 13px; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .error { background: #ffe8e8; color: #c41e1e; padding: 15px; border-radius: 6px; margin: 20px 0; }
    </style>
</head>
<body>

<div class="widget">
    <div class="header">
        <h2>E-Khata Help Center</h2>
        <p>Resource for Godrej Eternity Residents</p>
    </div>
    
    <div class="content">
        <div class="desc">📋 Prepared by Godrej Eternity e-Khata Volunteers Team</div>
        <div id="faq-container" class="loading">Loading FAQs...</div>
        
        <div class="footer">
            <p>Last updated: April 2026 | For additional help, visit the official BBMP portal</p>
        </div>
    </div>
</div>

<script>
    // Google Sheet ID
    const SHEET_ID = "1SpPWDuj1WfuSA2tv9AVPGsNGMTycMk4PKaliltBnp04";
    const EXPORT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
    
    let allFAQs = [];

    async function loadFAQs() {
        try {
            const response = await fetch(EXPORT_URL);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const csvText = await response.text();
            console.log('CSV loaded, length:', csvText.length);
            
            parseCSV(csvText);
            
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('faq-container').innerHTML = `
                <div class="error">
                    ⚠️ Unable to load FAQs from Google Sheet<br><br>
                    <strong>This will work perfectly on GitHub Pages!</strong><br><br>
                    To test: Deploy to GitHub and visit your live site.
                </div>
            `;
        }
    }

    function parseCSV(csvText) {
        const lines = csvText.trim().split('\n');
        
        if (lines.length < 2) {
            showError('Sheet is empty');
            return;
        }
        
        // Parse data rows
        allFAQs = [];
        
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            
            // Parse CSV line - handle quoted fields
            const fields = parseCSVLine(line);
            
            if (fields.length >= 3) {
                const category = fields[0].trim();
                const question = fields[1].trim();
                const answer = fields[2].trim();
                
                if (category && question && answer) {
                    allFAQs.push({ category, question, answer });
                }
            }
        }
        
        console.log('Total FAQs loaded:', allFAQs.length);
        
        if (allFAQs.length === 0) {
            showError(`No valid FAQs found. Check sheet format.`);
            return;
        }
        
        renderFAQsByCategory();
    }

    function parseCSVLine(line) {
        // Handle CSV with quoted fields
        const fields = [];
        let current = '';
        let inQuotes = false;
        
        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            const nextChar = line[i + 1];
            
            if (char === '"') {
                if (inQuotes && nextChar === '"') {
                    // Escaped quote
                    current += '"';
                    i++;
                } else {
                    // Toggle quote state
                    inQuotes = !inQuotes;
                }
            } else if (char === ',' && !inQuotes) {
                // Field separator
                fields.push(current);
                current = '';
            } else {
                current += char;
            }
        }
        
        fields.push(current);
        return fields;
    }

    function showError(message) {
        document.getElementById('faq-container').innerHTML = `<div class="error">${message}</div>`;
    }

    function renderFAQsByCategory() {
        const container = document.getElementById('faq-container');
        
        // Get unique categories in order they appear
        const categories = [];
        const categoryOrder = {};
        
        allFAQs.forEach((faq, index) => {
            if (!categoryOrder.hasOwnProperty(faq.category)) {
                categories.push(faq.category);
                categoryOrder[faq.category] = index;
            }
        });
        
        let html = '';
        let globalCounter = 1;
        
        categories.forEach(category => {
            html += `<div class="cat-title">${category}</div>`;
            
            const categoryFAQs = allFAQs.filter(f => f.category === category);
            categoryFAQs.forEach((faq) => {
                const uniqueID = `faq-item-${globalCounter}`;
                html += `
                <div class="faq-item" id="${uniqueID}">
                    <div class="faq-q" onclick="toggleFAQ('${uniqueID}')">
                        <span class="badge">${globalCounter}</span>
                        <span>${faq.question}</span>
                    </div>
                    <div class="faq-a">
                        <div class="faq-answer-content">${convertLinksToHTML(faq.answer)}</div>
                    </div>
                </div>`;
                globalCounter++;
            });
        });
        
        container.innerHTML = html;
    }

    function convertLinksToHTML(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, '<a href="$1" target="_blank">$1</a>');
    }

    function toggleFAQ(id) {
        const element = document.getElementById(id);
        element.classList.toggle('open');
    }

    window.onload = loadFAQs;
</script>
</body>
</html>
