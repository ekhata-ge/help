<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Khata Help - Godrej Eternity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f7f6; padding: 20px; }
        .widget { max-width: 850px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { background: #0d3b6e; color: #fff; padding: 30px; text-align: center; }
        .header h2 { font-size: 28px; margin-bottom: 8px; }
        .header p { font-size: 16px; opacity: 0.95; }
        
        .tabs-container { background: #fff; border-bottom: 2px solid #e0e0e0; padding: 0; display: flex; gap: 0; overflow-x: auto; }
        .tab-button { flex: 1; min-width: 120px; padding: 14px 16px; cursor: pointer; border: none; background: #fff; color: #555; font-weight: 600; font-size: 14px; transition: all 0.3s ease; border-bottom: 3px solid transparent; white-space: nowrap; }
        .tab-button:hover { background: #f5f5f5; }
        .tab-button.active { background: #f0f5ff; color: #0d3b6e; border-bottom-color: #0d3b6e; }
        
        .content { padding: 25px; min-height: 500px; }
        .desc { font-size: 13px; font-style: italic; color: #0d3b6e; margin-bottom: 25px; padding: 12px; background: #eef4fb; border-radius: 6px; border-left: 4px solid #0d3b6e; }
        
        .faq-item { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; }
        .faq-q { padding: 16px; cursor: pointer; font-weight: 600; background: #fff; display: flex; align-items: flex-start; gap: 12px; font-size: 15px; user-select: none; transition: all 0.2s ease; }
        .faq-q:hover { background: #f9fbff; }
        .faq-q::before { content: "▶"; display: inline-block; width: 20px; color: #0d3b6e; transition: transform 0.2s ease; flex-shrink: 0; }
        .faq-item.open .faq-q::before { transform: rotate(90deg); }
        .faq-a { padding: 0 16px; max-height: 0; overflow: hidden; transition: all 0.3s ease; }
        .faq-item.open .faq-a { padding: 16px; max-height: 500px; }
        .faq-answer-content { background: #fafafa; padding: 16px; border-radius: 6px; line-height: 1.7; font-size: 14px; color: #333; }
        .faq-item.open .faq-q { background: #f0f5ff; border-radius: 8px 8px 0 0; }
        
        a { color: #1a5cb5; text-decoration: underline; font-weight: 500; }
        a:hover { color: #0d3b6e; }
        
        .footer { text-align: center; padding: 20px; border-top: 1px solid #eee; margin-top: 20px; color: #666; font-size: 13px; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .error { background: #ffe8e8; color: #c41e1e; padding: 15px; border-radius: 6px; margin: 20px 0; }
    </style>
</head>
<body>

<div class="widget">
    <div class="header">
        <h2>E-Khata Help Center</h2>
        <p>Resource for Godrej Eternity Residents</p>
    </div>
    
    <div class="tabs-container" id="tabs-container"></div>
    
    <div class="content">
        <div class="desc">📋 Prepared by Godrej Eternity e-Khata Volunteers Team</div>
        <div id="faq-container" class="loading">Loading FAQs...</div>
        
        <div class="footer">
            <p>Last updated: April 2026 | For additional help, visit the official BBMP portal</p>
        </div>
    </div>
</div>

<script>
    // Google Sheet ID
    const SHEET_ID = "1SpPWDuj1WfuSA2tv9AVPGsNGMTycMk4PKaliltBnp04";
    
    // CORS proxy - allows fetching from Google Sheets without CORS errors
    const CORS_PROXY = "https://cors-anywhere.herokuapp.com/";
    const EXPORT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
    
    // Fallback: Direct fetch without proxy (works on GitHub Pages)
    const DIRECT_URL = EXPORT_URL;
    
    // Category display names (short names for tabs)
    const categoryShortNames = {
        "Technical Issues": "Tech",
        "Application Process": "Process",
        "General Information": "General",
        "Status & Search": "Status",
        "Documents": "Documents"
    };
    
    let allFAQs = [];
    let currentCategory = null;

    async function loadFAQs() {
        try {
            let csvText = null;
            
            // Try direct fetch first (works on GitHub Pages)
            try {
                const response = await fetch(DIRECT_URL);
                if (response.ok) {
                    csvText = await response.text();
                }
            } catch (e) {
                console.log("Direct fetch failed, will try CORS proxy...");
            }
            
            // If direct fetch failed, try with CORS proxy (works locally)
            if (!csvText) {
                try {
                    const response = await fetch(CORS_PROXY + EXPORT_URL);
                    if (response.ok) {
                        csvText = await response.text();
                    }
                } catch (e) {
                    console.log("CORS proxy also failed");
                }
            }
            
            // If both failed, show helpful error
            if (!csvText) {
                throw new Error("Could not fetch from Google Sheet");
            }
            
            // Parse CSV
            parseAndDisplayFAQs(csvText);
            
        } catch (error) {
            console.error('Error loading FAQs:', error);
            document.getElementById('faq-container').innerHTML = `
                <div class="error">
                    ⚠️ Unable to load FAQs from Google Sheet<br><br>
                    <strong>This is a browser security issue.</strong><br><br>
                    ✅ <strong>Good news:</strong> It will work perfectly when you deploy to GitHub Pages!<br><br>
                    <strong>To test locally:</strong><br>
                    1. Try using a different browser<br>
                    2. Or deploy to GitHub and test there<br><br>
                    <strong>Make sure your Google Sheet:</strong><br>
                    • Is shared ("Anyone with the link")<br>
                    • Has columns: Category | Question | Answer
                </div>
            `;
        }
    }

    function parseAndDisplayFAQs(csvText) {
        // Parse CSV
        const lines = csvText.trim().split('\n');
        
        // Skip header row (first line)
        allFAQs = lines.slice(1).map(line => {
            // Parse CSV with quotes
            const match = line.match(/"([^"]*)","([^"]*)","(.*)"/);
            if (match) {
                return {
                    category: match[1].trim(),
                    question: match[2].trim(),
                    answer: match[3].trim()
                };
            }
            return null;
        }).filter(item => item && item.category && item.question && item.answer);
        
        if (allFAQs.length === 0) {
            document.getElementById('faq-container').innerHTML = '<div class="error">No FAQs found in Google Sheet. Please check your sheet format.</div>';
            return;
        }
        
        // Get unique categories in order
        const categories = [...new Set(allFAQs.map(f => f.category))];
        
        renderTabs(categories);
        currentCategory = categories[0];
        renderFAQs(currentCategory);
    }

    function renderTabs(categories) {
        const tabsContainer = document.getElementById('tabs-container');
        let html = '';
        
        categories.forEach((cat, index) => {
            const shortName = categoryShortNames[cat] || cat;
            const isActive = index === 0 ? 'active' : '';
            html += `<button class="tab-button ${isActive}" onclick="selectCategory(event, '${cat}')">${shortName}</button>`;
        });
        
        tabsContainer.innerHTML = html;
    }

    function selectCategory(event, category) {
        currentCategory = category;
        
        // Update active tab
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');
        
        renderFAQs(category);
    }

    function renderFAQs(category) {
        const container = document.getElementById('faq-container');
        const categoryFAQs = allFAQs.filter(f => f.category === category);
        
        if (categoryFAQs.length === 0) {
            container.innerHTML = '<p>No FAQs in this category.</p>';
            return;
        }
        
        let html = '';
        categoryFAQs.forEach((faq, index) => {
            const uniqueID = `faq-${category}-${index}`;
            html += `
                <div class="faq-item" id="${uniqueID}">
                    <div class="faq-q" onclick="toggleFAQ('${uniqueID}')">
                        <span>${faq.question}</span>
                    </div>
                    <div class="faq-a">
                        <div class="faq-answer-content">${convertLinksToHTML(faq.answer)}</div>
                    </div>
                </div>`;
        });
        
        container.innerHTML = html;
    }

    function convertLinksToHTML(text) {
        // Convert URLs in text to clickable links
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, '<a href="$1" target="_blank">$1</a>');
    }

    function toggleFAQ(id) {
        const element = document.getElementById(id);
        element.classList.toggle('open');
    }

    window.onload = loadFAQs;
</script>
</body>
</html>
