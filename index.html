<style>

  #gba-faq-widget .gba-chip {

  #gba-faq-widget .gba-chip.active {

    color: #fff;
    border-color: #0d3b6e;
  }

  /* FAQ accordion */
  #gba-faq-widget .gba-faq-list { display: flex; flex-direction: column; gap: 8px; }
  #gba-faq-widget .gba-item {
    border: 1px solid #e5e8ed;
    border-radius: 8px;
    overflow: hidden;
  }
  #gba-faq-widget .gba-q {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    cursor: pointer;
  }
  #gba-faq-widget .gba-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    background: #e8f0fb;
    color: #1a5cb5;
  }
  #gba-faq-widget .gba-q-text { flex: 1; font-size: 14px; font-weight: 500; }
  #gba-faq-widget .gba-arrow { font-size: 11px; color: #999; transition: transform 0.2s; }
  #gba-faq-widget .gba-item.open .gba-arrow { transform: rotate(90deg); }
  #gba-faq-widget .gba-a {
    display: none;
    padding: 12px 16px 14px 16px;
    font-size: 13px;
    color: #444;
    line-height: 1.7;
    border-top: 1px solid #f0f2f5;
    background: #fafbfc;
  }
  #gba-faq-widget .gba-item.open .gba-a { display: block; }

  /* Chat */
  #gba-faq-widget .gba-messages {
    min-height: 260px;
    max-height: 360px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }
  #gba-faq-widget .gba-msg { max-width: 82%; padding: 11px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
  #gba-faq-widget .gba-msg.user { align-self: flex-end; background: #0d3b6e; color: #fff; border-radius: 12px 12px 3px 12px; }
  #gba-faq-widget .gba-msg.bot { align-self: flex-start; background: #f4f5f7; border: 1px solid #e5e8ed; border-radius: 12px 12px 12px 3px; }
  #gba-faq-widget .gba-input-row { display: flex; gap: 8px; border-top: 1px solid #e5e8ed; padding-top: 14px; }
  #gba-faq-widget .gba-input { flex: 1; padding: 10px 14px; font-size: 13px; border: 1px solid #d0d5dd; border-radius: 8px; outline: none; }
  #gba-faq-widget .gba-send { padding: 10px 20px; background: #0d3b6e; color: #fff; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; }
</style>

</div>

function gbaTab(name) {
  document.querySelectorAll('.gba-tab').forEach((t, i) => t.classList.toggle('active', ['faq','chat'][i] === name));
  document.getElementById('gba-panel-faq').classList.toggle('active', name === 'faq');
  document.getElementById('gba-panel-chat').classList.toggle('active', name === 'chat');
}

  var cats = ['All'];
  GBA_FAQS.forEach(f => { if (!cats.includes(f.cat)) cats.push(f.cat); });

  var filtered = gbaActiveFilter === 'All' ? GBA_FAQS : GBA_FAQS.filter(f => f.cat === gbaActiveFilter);
  document.getElementById('gba-faq-list').innerHTML = filtered.map((f, i) => `
    <div class="gba-item" id="gba-item-${i}">
      <div class="gba-q" onclick="gbaToggle('gba-item-${i}')">
        <span class="gba-badge">${f.cat}</span>
        <span class="gba-q-text">${f.q}</span>
        <span class="gba-arrow">&#9654;</span>
      </div>
      <div class="gba-a">${f.a}</div>
    </div>`).join('');
}
