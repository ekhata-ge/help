<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Khata Help - Godrej Eternity</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f4f7f6;
    padding: 20px;
}

.widget {
    max-width: 1000px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #ccc;
}

.header {
    background: #0d3b6e;
    color: #fff;
    padding: 25px;
    text-align: center;
}

.content {
    padding: 20px;
}

.desc {
    font-size: 13px;
    color: #0d3b6e;
    margin-bottom: 15px;
    padding: 10px;
    background: #eef4fb;
}

/* Layout */
.layout {
    display: flex;
    gap: 20px;
}

/* Sidebar tabs */
.sidebar {
    width: 220px;
    border-right: 1px solid #eee;
}

.tab {
    padding: 10px;
    cursor: pointer;
    border-radius: 6px;
    margin-bottom: 5px;
    font-size: 14px;
}

.tab:hover {
    background: #f0f5ff;
}

.tab.active {
    background: #0d3b6e;
    color: white;
}

/* Right content */
.main {
    flex: 1;
}

/* Rich search */
.search-wrapper {
    position: relative;
    margin-bottom: 15px;
}

.search-box {
    width: 100%;
    padding: 12px 14px 12px 40px;
    border-radius: 25px;
    border: 1px solid #ccc;
    font-size: 14px;
    outline: none;
}

.search-box:focus {
    border-color: #0d3b6e;
    box-shadow: 0 0 0 2px rgba(13,59,110,0.1);
}

.search-icon {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    font-size: 14px;
    color: #666;
}

/* FAQ */
.faq-item {
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-bottom: 12px;
}

.faq-q {
    padding: 14px;
    cursor: pointer;
    display: flex;
    gap: 10px;
    font-weight: 600;
}

.faq-q::before {
    content: "▶";
    color: #0d3b6e;
    transition: 0.2s;
}

.faq-item.open .faq-q::before {
    transform: rotate(90deg);
}

.faq-a {
    max-height: 0;
    overflow: hidden;
    transition: 0.3s;
}

.faq-item.open .faq-a {
    max-height: 1000px;
    padding: 14px;
}

.faq-answer-content {
    background: #fafafa;
    padding: 12px;
    border-radius: 6px;
    font-size: 14px;
}

.badge {
    background: #0d3b6e;
    color: #fff;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
    min-width: 28px;
    text-align: center;
}

.footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    color: #666;
}

.loading { text-align: center; padding: 30px; }
</style>
</head>

<body>

<div class="widget">
    <div class="header">
        <h2>E-Khata Help Center</h2>
        <p>Resource for Godrej Eternity Residents</p>
    </div>

    <div class="content">
        <div class="desc">📋 Prepared by Volunteers Team</div>
        <div id="faq-container" class="loading">Loading...</div>
        <div class="footer">Last updated: April 2026</div>
    </div>
</div>

<script>
const SHEET_ID = "1SpPWDuj1WfuSA2tv9AVPGsNGMTycMk4PKaliltBnp04";
const EXPORT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

let allFAQs = [];
let currentCategory = "All Questions";
let currentSearch = "";

/* LOAD */
async function loadFAQs(){
    const res = await fetch(EXPORT_URL);
    const text = await res.text();
    parseCSV(text);
}

/* CSV PARSER */
function parseCSV(text){
    const rows=[];
    let row=[],field='',inQuotes=false;

    for(let i=0;i<text.length;i++){
        let c=text[i],n=text[i+1];

        if(c=='"' && inQuotes && n=='"'){field+='"';i++;}
        else if(c=='"'){inQuotes=!inQuotes;}
        else if(c==',' && !inQuotes){row.push(field);field='';}
        else if(c=='\n' && !inQuotes){row.push(field);rows.push(row);row=[];field='';}
        else field+=c;
    }

    if(field)row.push(field);
    if(row.length)rows.push(row);

    allFAQs = rows.slice(1).map(r=>({
        category:r[0]?.trim(),
        question:r[1]?.trim(),
        answer:r[2]?.trim()
    })).filter(f=>f.category && f.question && f.answer);

    render();
}

/* RENDER */
function render(){
    const container=document.getElementById('faq-container');
    const categories=[...new Set(allFAQs.map(f=>f.category))];

    let html=`
    <div class="layout">
        <div class="sidebar">
            <div class="tab ${currentCategory==="All Questions"?"active":""}" onclick="changeCategory('All Questions')">All Questions</div>
            ${categories.map(c=>`
                <div class="tab ${currentCategory===c?"active":""}" onclick="changeCategory('${c}')">${c}</div>
            `).join('')}
        </div>

        <div class="main">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input class="search-box" placeholder="Search FAQs..." oninput="handleSearch(event)">
            </div>
    `;

    let data = currentCategory==="All Questions"
        ? allFAQs
        : allFAQs.filter(f=>f.category===currentCategory);

    if(currentSearch){
        let s=currentSearch.toLowerCase();
        data=data.filter(f=>f.question.toLowerCase().includes(s)||f.answer.toLowerCase().includes(s));
    }

    let i=1;

    data.forEach(f=>{
        html+=`
        <div class="faq-item" id="faq-${i}">
            <div class="faq-q" onclick="toggleFAQ('faq-${i}')">
                <span class="badge">${i}</span>
                <span>${f.question}</span>
            </div>
            <div class="faq-a">
                <div class="faq-answer-content">${linkify(f.answer)}</div>
            </div>
        </div>`;
        i++;
    });

    html+=`</div></div>`;
    container.innerHTML=html;
}

/* EVENTS */
function changeCategory(c){
    currentCategory=c;
    render();
}

function handleSearch(e){
    currentSearch = e.target.value;
    render();
}

function toggleFAQ(id){
    document.getElementById(id).classList.toggle("open");
}

function linkify(text){
    return text.replace(/https?:\/\/[^\s]+/g,u=>`<a href="${u}" target="_blank">${u}</a>`);
}

window.onload=loadFAQs;
</script>

</body>
</html>
