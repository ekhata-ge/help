<style>
  #gba-faq-widget * { box-sizing: border-box; margin: 0; padding: 0; }
  #gba-faq-widget {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    max-width: 820px;
    margin: 0 auto;
    color: #1a1a1a;
  }
  #gba-faq-widget .gba-header {
    background: #0d3b6e;
    color: #fff;
    padding: 28px 32px 24px;
    border-radius: 12px 12px 0 0;
  }
  #gba-faq-widget .gba-header h2 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  #gba-faq-widget .gba-header p {
    font-size: 14px;
    opacity: 0.75;
  }
  #gba-faq-widget .gba-tabs {
    display: flex;
    background: #f5f6f8;
    border-left: 1px solid #e0e3e8;
    border-right: 1px solid #e0e3e8;
  }
  #gba-faq-widget .gba-tab {
    flex: 1;
    padding: 13px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: none;
    color: #666;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  #gba-faq-widget .gba-tab.active {
    color: #0d3b6e;
    border-bottom-color: #0d3b6e;
    background: #fff;
  }
  #gba-faq-widget .gba-tab:hover:not(.active) { background: #eceef1; }
  #gba-faq-widget .gba-body {
    background: #fff;
    border: 1px solid #e0e3e8;
    border-top: none;
    border-radius: 0 0 12px 12px;
    padding: 24px;
  }
  #gba-faq-widget .gba-panel { display: none; }
  #gba-faq-widget .gba-panel.active { display: block; }

  /* Filters */
  #gba-faq-widget .gba-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 18px;
  }
  #gba-faq-widget .gba-chip {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid #d0d5dd;
    background: #fff;
    color: #555;
    cursor: pointer;
    transition: all 0.15s;
  }
  #gba-faq-widget .gba-chip.active {
    background: #0d3b6e;
    color: #fff;
    border-color: #0d3b6e;
  }
  #gba-faq-widget .gba-chip:hover:not(.active) { background: #f0f2f5; }

  /* FAQ accordion */
  #gba-faq-widget .gba-faq-list { display: flex; flex-direction: column; gap: 8px; }
  #gba-faq-widget .gba-item {
    border: 1px solid #e5e8ed;
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  #gba-faq-widget .gba-item:hover { border-color: #b8c0cc; }
  #gba-faq-widget .gba-item.open { border-color: #0d3b6e; }
  #gba-faq-widget .gba-q {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    cursor: pointer;
    background: #fff;
  }
  #gba-faq-widget .gba-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    background: #e8f0fb;
    color: #1a5cb5;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }
  #gba-faq-widget .gba-q-text {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: #1a1a1a;
    line-height: 1.4;
  }
  #gba-faq-widget .gba-arrow {
    font-size: 11px;
    color: #999;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  #gba-faq-widget .gba-item.open .gba-arrow { transform: rotate(90deg); }
  #gba-faq-widget .gba-a {
    display: none;
    padding: 0 16px 14px 16px;
    font-size: 13px;
    color: #444;
    line-height: 1.7;
    border-top: 1px solid #f0f2f5;
    padding-top: 12px;
    background: #fafbfc;
  }
  #gba-faq-widget .gba-item.open .gba-a { display: block; }

  /* Chat */
  #gba-faq-widget .gba-chat-wrap { display: flex; flex-direction: column; gap: 0; }
  #gba-faq-widget .gba-chat-hint {
    font-size: 13px;
    color: #666;
    margin-bottom: 14px;
    padding: 10px 14px;
    background: #f0f5ff;
    border-radius: 8px;
    border-left: 3px solid #0d3b6e;
  }
  #gba-faq-widget .gba-messages {
    min-height: 260px;
    max-height: 360px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
    padding: 4px 0;
  }
  #gba-faq-widget .gba-msg {
    max-width: 82%;
    padding: 11px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.6;
  }
  #gba-faq-widget .gba-msg.user {
    align-self: flex-end;
    background: #0d3b6e;
    color: #fff;
    border-radius: 12px 12px 3px 12px;
  }
  #gba-faq-widget .gba-msg.bot {
    align-self: flex-start;
    background: #f4f5f7;
    color: #1a1a1a;
    border: 1px solid #e5e8ed;
    border-radius: 12px 12px 12px 3px;
  }
  #gba-faq-widget .gba-msg.typing { color: #888; font-style: italic; }
  #gba-faq-widget .gba-input-row {
    display: flex;
    gap: 8px;
    border-top: 1px solid #e5e8ed;
    padding-top: 14px;
  }
  #gba-faq-widget .gba-input {
    flex: 1;
    padding: 10px 14px;
    font-size: 13px;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    outline: none;
    font-family: inherit;
    color: #1a1a1a;
    background: #fff;
  }
  #gba-faq-widget .gba-input:focus { border-color: #0d3b6e; box-shadow: 0 0 0 3px rgba(13,59,110,0.08); }
  #gba-faq-widget .gba-send {
    padding: 10px 20px;
    background: #0d3b6e;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  #gba-faq-widget .gba-send:hover { background: #0a2f58; }
  #gba-faq-widget .gba-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: #aaa;
  }
</style>

<div id="gba-faq-widget">
  <div class="gba-header">
    <h2>GBA e-Khata — Help & FAQ</h2>
    <p>Greater Bengaluru Authority &middot; Property & e-Khata queries</p>
  </div>

  <div class="gba-tabs">
    <button class="gba-tab active" onclick="gbaTab('faq')">Browse FAQs</button>
    <button class="gba-tab" onclick="gbaTab('chat')">Chat with AI Assistant</button>
  </div>

  <div class="gba-body">
    <div id="gba-panel-faq" class="gba-panel active">
      <div class="gba-filters" id="gba-filters"></div>
      <div class="gba-faq-list" id="gba-faq-list"></div>
    </div>

    <div id="gba-panel-chat" class="gba-panel">
      <div class="gba-chat-hint">
        The AI assistant answers based on our official FAQ content.
      </div>
      <div class="gba-messages" id="gba-messages">
        <div class="gba-msg bot">Hello! I am the GBA e-Khata assistant. Ask me anything about e-Khata.</div>
      </div>
      <div class="gba-input-row">
        <input class="gba-input" id="gba-chat-input" type="text" placeholder="Type your question here..." onkeydown="if(event.key==='Enter')gbaSend()">
        <button class="gba-send" onclick="gbaSend()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// GEMINI SETTINGS
// ============================================================
const GEMINI_API_KEY = "AIzaSyA-R0YDHfoXHVj-IRpAD9ptBzjfZ8b1d1E"; 
const GEMINI_MODEL = "gemini-2.5-flash-lite";

var GBA_FAQS = [
  { q: "What is e-Khata?", a: "e-Khata is a digital property ownership document issued by the Greater Bengaluru Authority (GBA).", cat: "General" },
  { q: "Who is eligible to apply for e-Khata?", a: "Any property owner within GBA limits with up-to-date tax history.", cat: "Application" },
  { q: "What documents are required for e-Khata application?", a: "Sale deed, 15-year EC, latest tax receipt, Aadhar, and property sketch.", cat: "Documents" },
  { q: "How long does it take to get e-Khata?", a: "Typically 15 to 30 working days.", cat: "Status" },
  { q: "What are the fees for e-Khata?", a: "2% of property guidance value (min Rs. 500).", cat: "Fees" },
  { q: "How do I track my e-Khata application status?", a: "Visit gba.karnataka.gov.in and click on 'Track Application'.", cat: "Status" },
  { q: "Can I apply for e-Khata for inherited property?", a: "Yes, with a legal heirship certificate and death certificate.", cat: "Transfer" },
  { q: "How do I transfer e-Khata after buying a property?", a: "Apply online on the GBA portal with the registered sale deed.", cat: "Transfer" },
  { q: "Is e-Khata mandatory for getting a home loan?", a: "Yes, most banks require it as proof of ownership.", cat: "General" },
  { q: "What if my property is not in the GBA database?", a: "Visit your nearest GBA ward office with your original sale deed.", cat: "Technical" }
];

// FAQ Logic
var gbaActiveFilter = 'All';
function gbaTab(name) {
  document.querySelectorAll('.gba-tab').forEach((t, i) => t.classList.toggle('active', ['faq','chat'][i] === name));
  document.getElementById('gba-panel-faq').classList.toggle('active', name === 'faq');
  document.getElementById('gba-panel-chat').classList.toggle('active', name === 'chat');
}

function gbaRender() {
  var cats = ['All'];
  GBA_FAQS.forEach(f => { if (!cats.includes(f.cat)) cats.push(f.cat); });
  document.getElementById('gba-filters').innerHTML = cats.map(c => `<button class="gba-chip${c === gbaActiveFilter ? ' active' : ''}" onclick="gbaFilter('${c}')">${c}</button>`).join('');
  var filtered = gbaActiveFilter === 'All' ? GBA_FAQS : GBA_FAQS.filter(f => f.cat === gbaActiveFilter);
  document.getElementById('gba-faq-list').innerHTML = filtered.map((f, i) => `
    <div class="gba-item" id="gba-item-${i}">
      <div class="gba-q" onclick="gbaToggle('gba-item-${i}')">
        <span class="gba-badge">${f.cat}</span>
        <span class="gba-q-text">${f.q}</span>
        <span class="gba-arrow">&#9654;</span>
      </div>
      <div class="gba-a">${f.a}</div>
    </div>`).join('');
}

function gbaFilter(cat) { gbaActiveFilter = cat; gbaRender(); }
function gbaToggle(id) { document.getElementById(id).classList.toggle('open'); }

// ============================================================
// GEMINI CHAT LOGIC
// ============================================================
async function gbaSend() {
  var input = document.getElementById('gba-chat-input');
  var q = input.value.trim();
  if (!q) return;
  input.value = '';

  var msgs = document.getElementById('gba-messages');
  var userDiv = document.createElement('div');
  userDiv.className = 'gba-msg user';
  userDiv.textContent = q;
  msgs.appendChild(userDiv);

  var botDiv = document.createElement('div');
  botDiv.className = 'gba-msg bot typing';
  botDiv.textContent = 'Thinking...';
  msgs.appendChild(botDiv);
  msgs.scrollTop = msgs.scrollHeight;

  const context = GBA_FAQS.map(f => `Q: ${f.q}\nA: ${f.a}`).join('\n\n');
  const systemPrompt = `You are a helpful assistant for the Greater Bengaluru Authority (GBA) e-Khata portal. 
  Answer questions using ONLY this FAQ content: ${context}. 
  If the answer isn't here, say: "I'm sorry, I don't have that information. Please visit gba.karnataka.gov.in." 
  Keep answers short. User Question: ${q}`;

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: systemPrompt }] }]
      })
    });

    const data = await response.json();
    const reply = data.candidates[0].content.parts[0].text;
    botDiv.className = 'gba-msg bot';
    botDiv.textContent = reply;
  } catch(e) {
    botDiv.className = 'gba-msg bot';
    botDiv.textContent = 'Connection error. Please visit gba.karnataka.gov.in.';
  }
  msgs.scrollTop = msgs.scrollHeight;
}

gbaRender();
</script>
