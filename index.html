<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA e-Khata Help - Godrej Eternity</title>
    <style>
        #gba-faq-widget * { box-sizing: border-box; margin: 0; padding: 0; }
        #gba-faq-widget {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 850px;
            margin: 20px auto;
            color: #1a1a1a;
            line-height: 1.6;
        }
        #gba-faq-widget .gba-header {
            background: #0d3b6e;
            color: #fff;
            padding: 30px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }
        #gba-faq-widget .gba-header h2 { font-size: 24px; margin-bottom: 5px; }
        #gba-faq-widget .gba-tabs {
            display: flex;
            background: #f5f6f8;
            border: 1px solid #e0e3e8;
            border-top: none;
        }
        #gba-faq-widget .gba-tab {
            flex: 1; padding: 16px; font-size: 14px; font-weight: 700;
            cursor: pointer; border: none; background: none; color: #555;
            border-bottom: 3px solid transparent; transition: 0.2s;
        }
        #gba-faq-widget .gba-tab.active {
            color: #0d3b6e; border-bottom-color: #0d3b6e; background: #fff;
        }
        #gba-faq-widget .gba-body {
            background: #fff; border: 1px solid #e0e3e8; border-top: none;
            border-radius: 0 0 12px 12px; padding: 25px; min-height: 500px;
        }
        #gba-faq-widget .gba-panel { display: none; }
        #gba-faq-widget .gba-panel.active { display: block; }
        #gba-faq-widget .gba-desc {
            font-size: 13px; font-style: italic; color: #0d3b6e;
            margin-bottom: 20px; padding: 10px; background: #eef4fb; border-radius: 6px;
        }
        #gba-faq-widget .gba-category-section { margin-bottom: 30px; }
        #gba-faq-widget .gba-category-title { 
            font-size: 18px; color: #0d3b6e; border-bottom: 2px solid #0d3b6e;
            margin-bottom: 15px; padding-bottom: 5px; font-weight: bold;
        }
        #gba-faq-widget .gba-item { border: 1px solid #e5e8ed; border-radius: 8px; margin-bottom: 12px; }
        #gba-faq-widget .gba-q { display: flex; align-items: flex-start; gap: 12px; padding: 16px; cursor: pointer; }
        #gba-faq-widget .gba-q:hover { background: #f9fbff; }
        #gba-faq-widget .gba-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #e8f0fb; color: #1a5cb5; font-weight: bold; }
        #gba-faq-widget .gba-q-text { flex: 1; font-size: 15px; font-weight: 600; color: #1a1a1a; }
        #gba-faq-widget .gba-a { display: none; padding: 20px; font-size: 14px; color: #333; background: #fff; border-top: 1px solid #eee; }
        #gba-faq-widget .gba-item.open .gba-a { display: block; }
        #gba-faq-widget a { color: #1a5cb5; text-decoration: underline; font-weight: 500; }
        
        #gba-faq-widget .gba-messages { height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        #gba-faq-widget .gba-msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14px; }
        #gba-faq-widget .gba-msg.user { align-self: flex-end; background: #0d3b6e; color: #fff; border-bottom-right-radius: 2px; }
        #gba-faq-widget .gba-msg.bot { align-self: flex-start; background: #f0f2f5; color: #1a1a1a; border-bottom-left-radius: 2px; border: 1px solid #ddd; }
        #gba-faq-widget .gba-input-row { display: flex; gap: 10px; }
        #gba-faq-widget .gba-input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        #gba-faq-widget .gba-send { padding: 12px 25px; background: #0d3b6e; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="gba-faq-widget">
    <div class="gba-header">
        <h2>GBA e-Khata Assistant</h2>
        <p>Official Help Resource for Godrej Eternity Residents</p>
    </div>

    <div class="gba-tabs">
        <button id="tab-faq" class="gba-tab active" onclick="gbaTab('faq')">BROWSE ALL FAQS</button>
        <button id="tab-chat" class="gba-tab" onclick="gbaTab('chat')">ASK AI ASSISTANT</button>
    </div>

    <div class="gba-body">
        <div id="gba-panel-faq" class="gba-panel active">
            <div class="gba-desc"><b>Note:</b> Prepared by Godrej Eternity e-Khata Volunteers Team.</div>
            <div id="gba-faq-container"></div>
        </div>

        <div id="gba-panel-chat" class="gba-panel">
            <div id="gba-messages" class="gba-messages">
                <div class="gba-msg bot">Namaste! I am your e-Khata assistant. Ask me anything about the application process.</div>
            </div>
            <div class="gba-input-row">
                <input type="text" id="gba-chat-input" class="gba-input" placeholder="Type your question..." onkeydown="if(event.key==='Enter')gbaSend()">
                <button class="gba-send" onclick="gbaSend()">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    const GEMINI_API_KEY = "AIzaSyBa7WQyzEqzigkCpKtHXwfDRX8cx6sna7E"; 
    const GEMINI_MODEL = "gemini-2.5-flash-lite";

    const GBA_FAQS = [
        { cat: "Technical Issues", q: "I am getting a name mismatch issue. Where do I show the 'Sale Transferred' dropdown? In e-KYC or in KAVERI deed owners?", a: "Both sections should select 'Sale/Transferred'. If you cannot progress due to a technical issue, ensure the names in both sections match your registered sale deed exactly. If the error persists, it is likely a system sync issue with the GBA servers." },
        { cat: "Application Process", q: "What are the essential differences in filling the application for mutation of e-Khata between Phase 1 and Phase 2/3?", a: "<b>Phase 1:</b> Select 'No book'. The 18-digit Gram Panchayat ID is the Assessment ID.<br><b>Phase 2/3:</b> Select 'Book A125'. The Assessment ID is alphanumeric. Check if ARO has signed; if not, you must attach the manual Challan. Rest of the procedure remains the same." },
        { cat: "Technical Issues", q: "Two ePID numbers were created for the same Assessment number. How can this be sorted out?", a: "The GBA Helpdesk advises proceeding with the ePID that contains all property details except the address. The newly generated ePID with only the address should be ignored." },
        { cat: "General Information", q: "What are the different ways in which I can apply for e-Khata?", a: "There are four online modes:<br>1. <b>Self-Apply:</b> Use official videos and apply yourself.<br>2. <b>Local Entrepreneur:</b> Find authorized youth entrepreneurs on <a href='https://bbmpeaasthi.karnataka.gov.in/' target='_blank'>the portal</a>.<br>3. <b>Janasevaka:</b> Available in useful links on the official website.<br>4. <b>Bangalore One:</b> Visit any center for online application assistance." },
        { cat: "Application Process", q: "What should I enter in the 'Owners Share' column?", a: "Enter the percentage of ownership (e.g., 50% for joint owners). If you already have your e-Khata, update it here: <a href='https://bbmpeaasthi.karnataka.gov.in/citizen_core/UpdateOwnerShare' target='_blank'>Update Portal</a>." },
        { cat: "Status & Search", q: "For Phase 1 of the project, what are the steps to find my draft e-Khata?", a: "1. Visit the portal and login.<br>2. Select 'eKhata' > 'Draft to Final eKhata'.<br>3. Select Ward 198.<br>4. Search by 'Owner Name' and enter 'ಗೋದ್ರೇಜ್' (Godrej).<br>5. Look for your 18-digit Gram Panchayat number found in your Sale Deed." },
        { cat: "General Information", q: "What is the address for the BBMP Ward and ARO offices?", a: "<b>Ward Office:</b> 15/3, Kanakapura Main Rd, Talaghattapura, 560109.<br><b>ARO Office:</b> Srinivasa Arcade, No. 569/570, 80 feet Road, Kengeri Upanagara, 560060." },
        { cat: "Documents", q: "What are the document references for building license and approved plans?", a: "<b>Document 1:</b> BMICAPA/SS/RD/13/20152016 (Dated 13-10-2015).<br><b>Document 2:</b> BMICPA SITE PLAN (Dated 21-04-2016). Reference ID: 1501272677303." },
        { cat: "Documents", q: "Where can I find official digital copies of CC, Building License, and Site Plan?", a: "<b>CC/License:</b> <a href='https://drive.google.com/file/d/1yRJ2aRRN-1Jh5xIOOVW7xrNhaMFNMMev/view' target='_blank'>PDF Link</a><br><b>Site Plan:</b> <a href='https://drive.google.com/file/d/1c1iDRBJmwSRBMq4rEWZ-k6aPIxeBJ2a0/view' target='_blank'>PDF Link</a>" },
        { cat: "Application Process", q: "My Khata was approved in 'Godrej' name instead of mine. Should I apply for mutation separately?", a: "No. Ask for corrections in final khata using the correction link once logged in. Tickets or ARO visits typically resolve this in 7 to 10 days." },
        { cat: "Status & Search", q: "How do I find the status of a submitted e-Khata and where to download it?", a: "Status check: <a href='https://bbmpeaasthi.karnataka.gov.in/citizen_core/EkhataApplicationStatus' target='_blank'>Link</a><br>Download approved e-Khata: <a href='https://bbmpeaasthi.karnataka.gov.in/office/frmKhathaDownload.aspx' target='_blank'>Link</a>" },
        { cat: "Status & Search", q: "How to find the draft e-Khata for Phase 2 and Phase 3?", a: "In Ward 198, search by 'Book No' and enter 'A125'. Search for your Assessment or flat number. If not immediately visible, use page number hyperlinks to find the specific listing." },
        { cat: "Technical Issues", q: "Why is my property tax showing Rajarajeshwari Nagar/West zone?", a: "This is a transition discrepancy between BBMP and GBA. Officially we are in South, but some records still show West. This does not affect your legal status." }
    ];

    function gbaTab(name) {
        document.getElementById('tab-faq').classList.toggle('active', name === 'faq');
        document.getElementById('tab-chat').classList.toggle('active', name === 'chat');
        document.getElementById('gba-panel-faq').classList.toggle('active', name === 'faq');
        document.getElementById('gba-panel-chat').classList.toggle('active', name === 'chat');
    }

    function gbaRender() {
        const container = document.getElementById('gba-faq-container');
        const categories = [...new Set(GBA_FAQS.map(f => f.cat))].sort();
        let html = '';
        let globalIndex = 1;
        categories.forEach(cat => {
            html += `<div class="gba-category-section"><div class="gba-category-title">${cat}</div>`;
            GBA_FAQS.filter(f => f.cat === cat).forEach(f => {
                html += `<div class="gba-item" id="item-${globalIndex}"><div class="gba-q" onclick="document.getElementById('item-${globalIndex}').classList.toggle('open')"><span class="gba-badge">${globalIndex}</span><span class="gba-q-text">${f.q}</span></div><div class="gba-a">${f.a}</div></div>`;
                globalIndex++;
            });
            html += `</div>`;
        });
        container.innerHTML = html;
    }

    async function gbaSend() {
        const input = document.getElementById('gba-chat-input');
        const msgs = document.getElementById('gba-messages');
        const q = input.value.trim();
        if(!q) return;
        input.value = '';
        msgs.innerHTML += `<div class="gba-msg user">${q}</div>`;
        const botDiv = document.createElement('div');
        botDiv.className = 'gba-msg bot';
        botDiv.textContent = 'Searching...';
        msgs.appendChild(botDiv);
        msgs.scrollTop = msgs.scrollHeight;

        try {
            const contextText = GBA_FAQS.map(f => `Q: ${f.q} A: ${f.a}`).join(' ');
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: `Answer based ONLY on this info: ${contextText}. Question: ${q}` }] }] })
            });
            const data = await response.json();
            botDiv.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
        } catch(e) { botDiv.textContent = "Error connecting. Please refresh and try again."; }
        msgs.scrollTop = msgs.scrollHeight;
    }
    window.onload = gbaRender;
</script>
</body>
</html>
